<!DOCTYPE html>
<html>
<head>
    <title>Societies</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h3>All Societies</h3>

<table class="table table-bordered mt-3">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Action</th>
    </tr>

    {% for s in societies %}
    <tr>
        <td>{{ s[0] }}</td>
        <td>{{ s[1] }}</td>
        <td>
            <a href="/edit_society/{{ s[0] }}" class="btn btn-warning btn-sm">Edit</a>
            <a href="/delete_society/{{ s[0] }}" class="btn btn-danger btn-sm">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
