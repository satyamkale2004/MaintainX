<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaintenX Admin Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f7fb;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            background: #ffffff;
            border-right: 1px solid #ddd;
            padding: 20px;
        }

        .sidebar h4 {
            font-weight: bold;
            margin-bottom: 30px;
            color: #2c3e50;
        }

        .sidebar a {
            display: block;
            padding: 10px;
            margin: 8px 0;
            color: #555;
            text-decoration: none;
            border-radius: 6px;
        }

        .sidebar a:hover {
            background: #e9f2ff;
            color: #0d6efd;
        }

        .logout {
            position: absolute;
            bottom: 20px;
            width: 85%;
        }

        /* Content */
        .content {
            margin-left: 250px;
            padding: 25px;
        }

        .card-box {
            background: #ffffff;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .card-box p {
            margin: 0;
            color: #777;
        }

        .card-box h3 {
            margin-top: 10px;
            font-weight: bold;
        }

        .quick-actions a {
            margin-right: 10px;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4>MaintenX</h4>

    <a href="/admin_dashboard">Dashboard</a>
    <a href="/view_societies">Societies</a>
    <a href="/view_secretaries">Secretaries</a>

    <div class="logout">
        <a href="/logout" class="btn btn-danger w-100">Sign Out</a>
    </div>
</div>

<!-- CONTENT -->
<div class="content">

    <h3>Dashboard</h3>

    <!-- STATS -->
    <div class="row mt-4">

        <div class="col-md-3">
            <div class="card-box">
                <p>Societies</p>
                <h3>{{ societies_count }}</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card-box">
                <p>Secretaries</p>
                <h3>{{ secretaries_count }}</h3>
            </div>
        </div>
<!--
        <div class="col-md-3">
            <div class="card-box">
                <p>Members</p>
                <h3>{{ members_count }}</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card-box">
                <p>Bills Generated</p>
                <h3>{{ bills_count }}</h3>
            </div>
        </div>

    </div>

    <div class="row">

        <div class="col-md-4">
            <div class="card-box">
                <p>Pending Amount</p>
                <h3>₹{{ pending_amount }}</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card-box">
                <p>Total Collection</p>
                <h3>₹{{ total_collection }}</h3>
            </div>
        </div>

    </div>
-->
    <!-- QUICK ACTIONS -->
    <div class="card-box mt-4">
        <h5>Quick Actions</h5>
        <div class="quick-actions mt-3">
            <a href="/add_society" class="btn btn-primary">+ Add Society</a>
            <a href="/add_secretary" class="btn btn-secondary">Add Secretary</a>
        </div>
    </div>

</div>

</body>
</html>
