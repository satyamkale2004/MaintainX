<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Secretaries - MaintenX</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f7fb;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            background: #ffffff;
            border-right: 1px solid #ddd;
            padding: 20px;
        }

        .sidebar h4 {
            font-weight: bold;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            padding: 10px;
            margin: 8px 0;
            color: #555;
            text-decoration: none;
            border-radius: 6px;
        }

        .sidebar a:hover {
            background: #e9f2ff;
            color: #0d6efd;
        }

        .logout {
            position: absolute;
            bottom: 20px;
            width: 85%;
        }

        /* Content */
        .content {
            margin-left: 250px;
            padding: 25px;
        }

        .card-box {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        table th {
            background: #f1f1f1;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4>MaintenX</h4>

    <a href="/admin_dashboard">Dashboard</a>
    <a href="/view_societies">Societies</a>
    <a href="/view_secretaries">Secretaries</a>

    <div class="logout">
        <a href="/logout" class="btn btn-danger w-100">Sign Out</a>
    </div>
</div>

<!-- CONTENT -->
<div class="content">

    <h3>All Secretaries</h3>

    <div class="card-box mt-4">

        <table class="table table-bordered table-hover">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Society ID</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                {% for s in secretaries %}
                <tr>
                    <td>{{ s[0] }}</td>
                    <td>{{ s[1] }}</td>
                    <td>{{ s[2] }}</td>
                    <td>{{ s[3] }}</td>
                    <td>
                        <a href="/edit_secretary/{{ s[0] }}" class="btn btn-warning btn-sm">Edit</a>
                        <a href="/delete_secretary/{{ s[0] }}" class="btn btn-danger btn-sm"
                           onclick="return confirm('Delete this secretary?')">
                           Delete
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>

        </table>

    </div>

</div>

</body>
</html>
