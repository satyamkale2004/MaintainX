<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: #f4f7fb;
        }

        .card-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
    </style>
</head>

<body>

<div class="container mt-4">

    <h3>📊 Advanced Reports Dashboard</h3>

    <div class="row mt-4">

        <div class="col-md-6">
            <div class="card-box text-center">
                <h5>Total Collection</h5>
                <h2 class="text-success">₹{{ total_collection }}</h2>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card-box text-center">
                <h5>Pending Amount</h5>
                <h2 class="text-danger">₹{{ pending_amount }}</h2>
            </div>
        </div>
    </div>

    <!-- CHART -->
    <div class="card-box mt-4">
        <h5>Monthly Collection</h5>
        <canvas id="myChart"></canvas>
    </div>

</div>

<script>
    const ctx = document.getElementById('myChart');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: {{ months | safe }},
            datasets: [{
                label: 'Collection ₹',
                data: {{ amounts | safe }},
                borderWidth: 1
            }]
        }
    });
</script>

</body>
</html>
