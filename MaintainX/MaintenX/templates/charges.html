<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaintenX | Charges</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand">MaintenX Secretary</a>

        <div class="ms-auto">
            <a href="/secretary_dashboard" class="btn btn-light me-2">Dashboard</a>
            <a href="/logout" class="btn btn-danger">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <!-- TITLE -->
    <div class="dashboard-title">Manage Charges</div>

    <!-- ADD CHARGE FORM -->
    <div class="card mb-4">
        <div class="card-header">Add New Charge</div>
        <div class="card-body">

            <form method="POST">
                <div class="row">
                    <div class="col-md-5">
                        <input type="text" name="title" class="form-control" placeholder="Charge Title" required>
                    </div>

                    <div class="col-md-5">
                        <input type="number" name="amount" class="form-control" placeholder="Amount" required>
                    </div>

                    <div class="col-md-2">
                        <button class="btn btn-primary w-100">Add</button>
                    </div>
                </div>
            </form>

        </div>
    </div>

    <!-- CHARGES TABLE -->
    <div class="card">
        <div class="card-header">All Charges</div>

        <div class="card-body">

            <table class="table table-bordered text-center">

                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Amount</th>
                        <th>Date</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>

                    {% for c in charges %}
                    <tr>
                        <td>{{ c[0] }}</td>
                        <td>{{ c[2] }}</td>
                        <td>₹{{ c[3] }}</td>
                        <td>{{ c[4] }}</td>
                        <td>
                            <a href="/delete_charge/{{ c[0] }}" 
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Delete this charge?')">
                                Delete
                            </a>
                        </td>
                    </tr>
                    {% endfor %}

                </tbody>

            </table>

        </div>
    </div>

</div>

</body>
</html>
