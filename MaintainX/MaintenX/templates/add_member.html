<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaintenX | Add Member</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">

    <!-- JS -->
    <script src="/static/js/script.js"></script>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand">MaintenX Secretary</a>

        <div class="ms-auto">
            <a href="/secretary_dashboard" class="btn btn-light me-2">Dashboard</a>
            <a href="/logout" class="btn btn-danger">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-5">

    <div class="card">
        <div class="card-header">
            Add New Member
        </div>

        <div class="card-body">

            <form method="POST" action="/add_member" onsubmit="return validateForm()">

                <!-- Name -->
                <div class="mb-3">
                    <label>Full Name</label>
                    <input type="text" name="name" class="form-control" placeholder="Enter full name" required>
                </div>

                <!-- Email -->
                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" name="email" class="form-control" placeholder="Enter email" required>
                </div>

                <!-- Mobile -->
                <div class="mb-3">
                    <label>Mobile</label>
                    <input type="text" name="mobile" class="form-control" placeholder="Enter mobile number" required>
                </div>

                <!-- Flat Number -->
                <div class="mb-3">
                    <label>Flat / Shop No</label>
                    <input type="text" name="flat" class="form-control" placeholder="Enter flat/shop number" required>
                </div>

                <!-- Living Type -->
                <div class="mb-3">
                    <label>Living Type</label>
                    <select name="type" class="form-control" required>
                        <option value="">-- Select Type --</option>
                        <option value="Flat Owner">Flat Owner</option>
                        <option value="Shop Owner">Shop Owner</option>
                        <option value="Tenant">Tenant</option>
                    </select>
                </div>

                <!-- Maintenance Amount -->
                <div class="mb-3">
                    <label>Monthly Maintenance Amount (₹)</label>
                    <input type="number" name="maintenance" class="form-control" placeholder="Enter amount" required>
                </div>

                <!-- Password -->
                <div class="mb-3">
                    <label>Create Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Create password" required>
                </div>

                <!-- Buttons -->
                <div class="d-flex justify-content-between">
                    <a href="/secretary_dashboard" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-success">Add Member</button>
                </div>

            </form>

        </div>
    </div>

</div>

</body>
</html>
