<!DOCTYPE html>
<html>
<head>
    <title>Pay Bill</title>

    <!-- Razorpay -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#f4f7fb;">

<div class="container mt-5">

    <div class="card p-4 shadow">

        <h3 class="mb-4 text-center">💳 Bill Payment</h3>

        <!-- ✅ BILL DETAILS -->
        <table class="table table-bordered text-center">
            <tr>
                <th>Month</th>
                <td>{{ bill[2] }}</td>
            </tr>
            <tr>
                <th>Maintenance</th>
                <td>₹{{ bill[3] }}</td>
            </tr>
            <tr>
                <th>Penalty</th>
                <td>₹{{ bill[4] }}</td>
            </tr>
            <tr>
                <th>Charges</th>
                <td>₹{{ bill[8] }}</td>
            </tr>
            <tr class="table-success">
                <th>Total Payable</th>
                <td><strong>₹{{ final_amount }}</strong></td>
            </tr>
        </table>

        <!-- ✅ PAY BUTTON -->
        <div class="text-center">
            <button id="payBtn" class="btn btn-success btn-lg">
                Pay Now ₹{{ final_amount }}
            </button>
        </div>

    </div>

</div>

<script>
var options = {
    "key": "{{ key_id }}",
    "amount": "{{ order['amount'] }}",  // in paise
    "currency": "INR",
    "name": "MaintenX",
    "description": "Maintenance Bill Payment",
    "order_id": "{{ order['id'] }}",

    "handler": function (response){
        // ✅ success redirect
        window.location.href = "/payment_success/{{ bill[0] }}";
    },

    "theme": {
        "color": "#28a745"
    }
};

var rzp1 = new Razorpay(options);

// ✅ Open on button click (better UX)
document.getElementById('payBtn').onclick = function(e){
    rzp1.open();
    e.preventDefault();
}
</script>

</body>
</html>
