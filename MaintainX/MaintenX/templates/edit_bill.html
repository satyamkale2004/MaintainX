<!DOCTYPE html>
<html>
<head>
<title>Edit Bill</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h3>Edit Bill</h3>

    <form method="POST">

        <div class="mb-3">
            <label>Maintenance</label>
            <input type="number" name="maintenance" class="form-control" value="{{ bill[3] }}" required>
        </div>

        <div class="mb-3">
            <label>Penalty</label>
            <input type="number" name="penalty" class="form-control" value="{{ bill[4] }}" required>
        </div>

        <div class="mb-3">
            <label>Total</label>
            <input type="number" name="total" class="form-control" value="{{ bill[5] }}" required>
        </div>

        <button class="btn btn-primary">Update</button>
        <a href="/bills" class="btn btn-secondary">Cancel</a>

    </form>

</div>

</body>
</html>
