<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reports</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

<nav class="navbar navbar-dark">
    <div class="container-fluid">
        <span class="navbar-brand">MaintenX Secretary</span>
        <div>
            <a href="/secretary_dashboard" class="btn btn-light">Dashboard</a>
            <a href="/logout" class="btn btn-danger">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <div class="dashboard-title">Reports & Summary</div>

    <div class="row">

        <div class="col-md-6">
            <div class="card p-3 text-center">
                <h5>Total Collection</h5>
                <h3 class="text-success">₹{{ total_collection }}</h3>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card p-3 text-center">
                <h5>Pending Amount</h5>
                <h3 class="text-danger">₹{{ pending_amount }}</h3>
            </div>
        </div>

    </div>

</div>

</body>
</html>
